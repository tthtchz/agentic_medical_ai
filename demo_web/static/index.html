<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OhioT1DM · 代理血糖演示</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header>
    <h1>OhioT1DM 代理系统演示</h1>
    <p class="sub">
      请先用 <code>--holdout_subject</code> 训练（11 人进 LSTM、留 1 人），此处下拉框选<strong>同一受试者</strong>加载其 <code>Testing</code> 轨迹。
      页面展示：由<strong>过去</strong> CGM 窗口 → <strong>当前</strong>读数 → 对 <em>t+h</em> 的预测与实际，以及 LSTM / 指南等提示。
    </p>
  </header>

  <section class="controls">
    <label>留一受试者（演示用测试集）
      <select id="subject"></select>
    </label>
    <label>最大步数（加快加载）
      <input type="number" id="maxSteps" value="2500" min="200" step="100" />
    </label>
    <button type="button" id="loadBtn">加载轨迹</button>
    <span id="status" class="status"></span>
  </section>

  <section class="chart-wrap">
    <canvas id="chart"></canvas>
  </section>

  <section class="timeline">
    <label>时间步（决策时刻 <code>t</code>） <span id="tInfo"></span>
      <input type="range" id="stepSlider" min="0" max="0" value="0" />
    </label>
  </section>

  <section class="panels">
    <div class="panel">
      <h2>由过去到当前</h2>
      <p id="ctxPast" class="mono"></p>
      <p id="ctxNow" class="highlight"></p>
      <p id="ctxFuture" class="mono"></p>
    </div>
    <div class="panel">
      <h2>代理决策与提示</h2>
      <ul id="flags" class="flags"></ul>
      <p id="rationale" class="rationale"></p>
      <blockquote id="guideline" class="guideline"></blockquote>
    </div>
  </section>

  <footer>
    <p>启动：<code>conda activate agentic_medical_ai</code> · 项目根目录执行 <code>uvicorn demo_web.app:app --reload --host 127.0.0.1 --port 8000</code></p>
  </footer>

  <script src="/static/app.js"></script>
</body>
</html>
